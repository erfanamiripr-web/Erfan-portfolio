<!DOCTYPE html>
<html lang="fa" dir="rtl" data-lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت — Erfan Amiripour</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg: #F2F2F0; --white: #FFFFFF; --black: #111111;
    --mid: #888888; --border: #DEDEDE;
    --green: #1E7E34; --red: #C53030;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Vazirmatn','Inter',sans-serif;
    background: var(--bg); color: var(--black);
    direction: rtl; text-align: right;
    font-size: 13px; line-height: 1.7;
}
a { color: inherit; text-decoration: none; }
button { cursor:pointer; }

/* ── LOADING / AUTH GATE ── */
#gate {
    position: fixed; inset:0; background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    z-index: 500; flex-direction: column; gap: 14px;
}
#gate i { font-size: 22px; color: var(--mid); }
#gate p { color: var(--mid); font-size: 12px; }
#gate.hidden { display:none; }

/* ── LAYOUT ── */
.topbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display:flex; align-items:center; justify-content:space-between;
    position: sticky; top:0; z-index: 50;
}
.topbar .brand { font-weight:700; font-size: 14px; }
.topbar .brand span { color: var(--mid); font-weight: 400; font-size: 11px; margin-right: 8px; }
.topbar .actions { display:flex; align-items:center; gap: 14px; }
.topbar .actions a, .topbar .actions button {
    font-size: 11.5px; color: var(--mid); background:none; border:none;
}
.topbar .actions a:hover, .topbar .actions button:hover { color: var(--black); }

.wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

.tabs {
    display:flex; gap:4px; overflow-x:auto; margin-bottom: 22px;
    border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.tab {
    background:none; border:none; font-family:inherit;
    font-size: 12.5px; color: var(--mid); padding: 10px 16px;
    border-bottom: 2px solid transparent; white-space:nowrap;
}
.tab.active { color: var(--black); font-weight:600; border-bottom-color: var(--black); }

.panel { display:none; }
.panel.active { display:block; }

.card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px; margin-bottom: 12px;
}
.card h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.card .meta { font-size: 11px; color: var(--mid); margin-bottom: 10px; }

.row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.field { display:flex; flex-direction:column; gap:5px; flex:1; min-width: 140px; }
.field label { font-size: 11px; color: var(--mid); }
.field input, .field select, .field textarea {
    border:1px solid var(--border); border-radius:4px; padding:8px 10px;
    font-family:inherit; font-size:12.5px; background: var(--bg); color: var(--black);
    outline:none; width:100%;
}
.field textarea { resize: vertical; min-height: 60px; }

.btn {
    background: var(--black); color: var(--white); border:none;
    border-radius: 4px; padding: 9px 16px; font-size:12px; font-weight:500;
    font-family:inherit; transition: opacity .2s;
}
.btn:hover { opacity:.85; }
.btn.secondary { background: var(--bg); color: var(--black); border:1px solid var(--border); }
.btn.danger { background: var(--red); color:#fff; }
.btn.sm { padding: 6px 12px; font-size: 11px; }

.progress-bar { background: var(--border); border-radius: 999px; height:6px; overflow:hidden; margin: 8px 0; }
.progress-bar > div { background: var(--black); height:100%; transition: width .3s; }

.badge {
    display:inline-block; font-size: 10.5px; padding: 2px 9px;
    border-radius: 999px; font-weight:500;
}
.badge.open { background:#FDECEC; color: var(--red); }
.badge.answered { background:#E9F7EF; color: var(--green); }
.badge.closed { background: var(--border); color: var(--mid); }
.badge.in_progress { background:#FFF6E0; color:#B7791F; }
.badge.review { background:#E7F0FE; color:#2B6CB0; }
.badge.completed { background:#E9F7EF; color: var(--green); }

.empty { text-align:center; padding: 40px 0; color: var(--mid); font-size:12px; }
.msg { font-size:11.5px; padding:9px 11px; border-radius:4px; margin-bottom:12px; display:none; }
.msg.show { display:block; }
.msg.success { background:#E9F7EF; color: var(--green); }
.msg.error { background:#FDECEC; color: var(--red); }

.file-list-item, .msg-item {
    display:flex; justify-content:space-between; align-items:center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size:12px;
}
.file-list-item:last-child, .msg-item:last-child { border-bottom:none; }

.msg-item { flex-direction:column; align-items:flex-start; gap:4px; }
.msg-item .who { font-size: 10.5px; color: var(--mid); }
.msg-item.is-admin { background: #F8F8F6; padding:8px; border-radius:4px; border-bottom:none; }

select.role-pick { width:auto; }

.section-title { font-size: 12px; font-weight:700; margin: 18px 0 10px; color: var(--mid); text-transform:uppercase; letter-spacing:.04em; }

.ticket-toggle { cursor:pointer; }
.ticket-body { display:none; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.ticket-body.open { display:block; }
</style>
</head>
<body>

<div id="gate">
    <i class="fas fa-circle-notch fa-spin"></i>
    <p>در حال بررسی دسترسی…</p>
</div>

<div id="appRoot" style="display:none;">
    <div class="topbar">
        <div class="brand">پنل مدیریت <span id="adminEmail"></span></div>
        <div class="actions">
            <a href="/">صفحه اصلی</a>
            <button id="logoutBtn">خروج</button>
        </div>
    </div>

    <div class="wrap">
        <div class="tabs">
            <button class="tab active" data-target="panelProjects">پروژه‌ها</button>
            <button class="tab" data-target="panelTickets">تیکت‌ها</button>
            <button class="tab" data-target="panelPricing">تعرفه‌ها</button>
        </div>

        <!-- ═══════════ PROJECTS PANEL ═══════════ -->
        <div class="panel active" id="panelProjects">
            <div class="msg" id="projMsg"></div>

            <div class="card">
                <h3>ساخت پروژه‌ی جدید</h3>
                <div class="meta">برای یک کاربر ثبت‌نام‌کرده، یک پروژه بسازید</div>
                <div class="row">
                    <div class="field">
                        <label>کاربر</label>
                        <select id="newProjUser"></select>
                    </div>
                    <div class="field">
                        <label>عنوان پروژه</label>
                        <input type="text" id="newProjTitle" value="پروژه طراحی لوگو">
                    </div>
                </div>
                <div class="row" style="margin-top:10px;">
                    <button class="btn" id="createProjBtn">ساخت پروژه</button>
                </div>
            </div>

            <div class="section-title">پروژه‌های موجود</div>
            <div id="projectsList"><div class="empty">در حال بارگذاری...</div></div>
        </div>

        <!-- ═══════════ TICKETS PANEL ═══════════ -->
        <div class="panel" id="panelTickets">
            <div class="msg" id="ticketMsg"></div>
            <div id="ticketsList"><div class="empty">در حال بارگذاری...</div></div>
        </div>

        <!-- ═══════════ PRICING PANEL ═══════════ -->
        <div class="panel" id="panelPricing">
            <div class="msg" id="pricingMsg"></div>

            <div class="card">
                <h3>افزودن پکیج جدید</h3>
                <div class="row">
                    <div class="field"><label>عنوان (فارسی)</label><input type="text" id="newPlanTitleFa"></div>
                    <div class="field"><label>قیمت (تومان)</label><input type="number" id="newPlanPrice"></div>
                </div>
                <div class="row" style="margin-top:8px;">
                    <div class="field"><label>توضیح کوتاه</label><input type="text" id="newPlanDesc"></div>
                </div>
                <div class="row" style="margin-top:8px;">
                    <div class="field">
                        <label>ویژگی‌ها (هرکدام در یک خط)</label>
                        <textarea id="newPlanFeatures" placeholder="۲ پیشنهاد طراحی اولیه
۱ بار ادیت رایگان"></textarea>
                    </div>
                </div>
                <div class="row" style="margin-top:10px;">
                    <button class="btn" id="createPlanBtn">افزودن پکیج</button>
                </div>
            </div>

            <div class="section-title">پکیج‌های موجود</div>
            <div id="pricingList"><div class="empty">در حال بارگذاری...</div></div>
        </div>
    </div>
</div>

<!-- ═══════════ MODAL: PROJECT DETAIL ═══════════ -->
<div id="projModalBackdrop" style="display:none; position:fixed; inset:0; background:rgba(17,17,17,0.45); z-index:300; align-items:center; justify-content:center; padding:16px;">
    <div style="background:var(--white); border-radius:6px; max-width:480px; width:100%; max-height:88vh; overflow-y:auto; padding:22px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 id="pmTitle" style="font-size:14px;">جزئیات پروژه</h3>
            <button id="pmClose" style="background:none; border:none; font-size:16px; color:var(--mid);"><i class="fas fa-times"></i></button>
        </div>

        <div class="msg" id="pmMsg"></div>

        <div class="section-title">وضعیت و پیشرفت</div>
        <div class="field" style="margin-bottom:8px;">
            <label>وضعیت پروژه</label>
            <select id="pmStatus">
                <option value="in_progress">در حال انجام</option>
                <option value="review">در بررسی</option>
                <option value="revision">در حال ادیت</option>
                <option value="completed">تکمیل‌شده</option>
                <option value="cancelled">لغو شده</option>
            </select>
        </div>
        <div class="field" style="margin-bottom:8px;">
            <label>درصد پیشرفت: <span id="pmProgressVal">0</span>٪</label>
            <input type="range" id="pmProgress" min="0" max="100" step="5" value="0" style="width:100%;">
        </div>
        <div class="field" style="margin-bottom:8px;">
            <label>یادداشت برای کاربر</label>
            <textarea id="pmNote" placeholder="مثلاً: طراحی اولیه ارسال شد، منتظر بازخورد شما هستیم"></textarea>
        </div>
        <button class="btn sm" id="pmSaveBtn">ذخیره تغییرات</button>

        <div class="section-title">فایل‌های پرزنت</div>
        <div id="pmFilesList" style="margin-bottom:10px;"></div>
        <input type="file" id="pmFileInput" style="font-size:11px; margin-bottom:8px;">
        <button class="btn sm secondary" id="pmUploadBtn">آپلود فایل</button>

        <div class="section-title">حذف پروژه</div>
        <button class="btn sm danger" id="pmDeleteBtn">حذف کامل این پروژه</button>
    </div>
</div>

<script>
/* ════════════════════════════════════════════════
   CONFIG — همان مقادیر فایل اصلی index.html
   ════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://wagnaqhyhqdoerohctxn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndhZ25hcWh5aHFkb2Vyb2hjdHhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDkxOTgsImV4cCI6MjA5Nzg4NTE5OH0.4FzOaYQ20tqCk28vFOPYdGy5_5qJYtBStPzgZAc9Gpg';

if (!window.__sbClient) {
    window.__sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}
const sb = window.__sbClient;

let CURRENT_USER = null;
let ACTIVE_PROJECT_ID = null;

/* ════════════════════════════════════════════════
   AUTH GATE — فقط ادمین اجازه ورود دارد
   ════════════════════════════════════════════════ */
async function checkAdminAccess() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
        window.location.href = '/?login=1';
        return;
    }
    const { data: profile, error } = await sb
        .from('profiles')
        .select('role, full_name')
        .eq('id', session.user.id)
        .single();

    if (error || !profile || profile.role !== 'admin') {
        document.getElementById('gate').innerHTML =
            '<i class="fas fa-lock"></i><p>شما دسترسی به این صفحه را ندارید.</p><a href="/" class="btn sm" style="margin-top:10px;">بازگشت به سایت</a>';
        return;
    }

    CURRENT_USER = session.user;
    document.getElementById('adminEmail').textContent = profile.full_name || session.user.email;
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('appRoot').style.display = 'block';

    loadProjects();
    loadTickets();
    loadPricing();
}
checkAdminAccess();

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/';
});

/* ════════════════════════════════════════════════
   TABS
   ════════════════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById(t.dataset.target).classList.add('active');
    });
});

function showMsg(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'msg show ' + type;
    setTimeout(() => el.classList.remove('show'), 4000);
}

/* ════════════════════════════════════════════════
   PROJECTS
   ════════════════════════════════════════════════ */
const statusLabel = {
    in_progress: 'در حال انجام', review: 'در بررسی', revision: 'در حال ادیت',
    completed: 'تکمیل‌شده', cancelled: 'لغو شده'
};

async function loadProjects() {
    // لیست کاربران برای select ساخت پروژه جدید
    const { data: profiles } = await sb.from('profiles').select('id, full_name, role').eq('role', 'client');
    const userSelect = document.getElementById('newProjUser');
    userSelect.innerHTML = (profiles || []).map(p =>
        `<option value="${p.id}">${escapeHtml(p.full_name || p.id)}</option>`
    ).join('') || '<option value="">کاربری یافت نشد</option>';

    // لیست پروژه‌ها
    const { data: projects, error } = await sb
        .from('projects')
        .select('id, title, status, progress_percent, progress_note, user_id, profiles(full_name)')
        .order('created_at', { ascending: false });

    const listEl = document.getElementById('projectsList');
    if (error) { listEl.innerHTML = `<div class="empty">خطا در بارگذاری: ${escapeHtml(error.message)}</div>`; return; }
    if (!projects || projects.length === 0) { listEl.innerHTML = '<div class="empty">هنوز پروژه‌ای ساخته نشده</div>'; return; }

    listEl.innerHTML = projects.map(p => `
        <div class="card" style="cursor:pointer;" onclick="openProjectModal('${p.id}')">
            <h3>${escapeHtml(p.title)}</h3>
            <div class="meta">کاربر: ${escapeHtml(p.profiles?.full_name || '—')}</div>
            <span class="badge ${p.status}">${statusLabel[p.status] || p.status}</span>
            <div class="progress-bar"><div style="width:${p.progress_percent}%"></div></div>
            <div class="meta">${p.progress_percent}٪ — ${escapeHtml(p.progress_note || 'بدون یادداشت')}</div>
        </div>
    `).join('');
}

document.getElementById('createProjBtn').addEventListener('click', async () => {
    const userId = document.getElementById('newProjUser').value;
    const title = document.getElementById('newProjTitle').value.trim();
    if (!userId) { showMsg('projMsg', 'کاربری یافت نشد یا انتخاب نشده.', 'error'); return; }
    if (!title) { showMsg('projMsg', 'عنوان پروژه را وارد کنید.', 'error'); return; }

    const { error } = await sb.from('projects').insert({ user_id: userId, title });
    if (error) { showMsg('projMsg', error.message, 'error'); return; }
    showMsg('projMsg', 'پروژه با موفقیت ساخته شد.', 'success');
    document.getElementById('newProjTitle').value = 'پروژه طراحی لوگو';
    loadProjects();
});

/* ── PROJECT DETAIL MODAL ── */
async function openProjectModal(projectId) {
    ACTIVE_PROJECT_ID = projectId;
    const { data: p, error } = await sb.from('projects').select('*').eq('id', projectId).single();
    if (error) { alert(error.message); return; }

    document.getElementById('pmTitle').textContent = p.title;
    document.getElementById('pmStatus').value = p.status;
    document.getElementById('pmProgress').value = p.progress_percent;
    document.getElementById('pmProgressVal').textContent = p.progress_percent;
    document.getElementById('pmNote').value = p.progress_note || '';
    document.getElementById('projModalBackdrop').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    loadProjectFiles(projectId);
}

document.getElementById('pmProgress').addEventListener('input', (e) => {
    document.getElementById('pmProgressVal').textContent = e.target.value;
});

document.getElementById('pmClose').addEventListener('click', () => {
    document.getElementById('projModalBackdrop').style.display = 'none';
    document.body.style.overflow = '';
});

document.getElementById('pmSaveBtn').addEventListener('click', async () => {
    const status = document.getElementById('pmStatus').value;
    const progress_percent = parseInt(document.getElementById('pmProgress').value, 10);
    const progress_note = document.getElementById('pmNote').value.trim();

    const { error } = await sb.from('projects')
        .update({ status, progress_percent, progress_note, updated_at: new Date().toISOString() })
        .eq('id', ACTIVE_PROJECT_ID);

    if (error) { showMsg('pmMsg', error.message, 'error'); return; }
    showMsg('pmMsg', 'تغییرات ذخیره شد.', 'success');
    loadProjects();
});

document.getElementById('pmDeleteBtn').addEventListener('click', async () => {
    if (!confirm('آیا از حذف کامل این پروژه (و تمام فایل‌ها/تیکت‌های مرتبط) مطمئن هستید؟')) return;
    const { error } = await sb.from('projects').delete().eq('id', ACTIVE_PROJECT_ID);
    if (error) { showMsg('pmMsg', error.message, 'error'); return; }
    document.getElementById('projModalBackdrop').style.display = 'none';
    document.body.style.overflow = '';
    loadProjects();
});

/* ── PROJECT FILES ── */
async function loadProjectFiles(projectId) {
    const { data: files, error } = await sb
        .from('project_files')
        .select('id, file_name, storage_path, file_type, created_at')
        .eq('project_id', projectId)
        .order('created_at', { ascending: false });

    const el = document.getElementById('pmFilesList');
    if (error) { el.innerHTML = `<div class="meta">خطا: ${escapeHtml(error.message)}</div>`; return; }
    if (!files || files.length === 0) { el.innerHTML = '<div class="meta">فایلی آپلود نشده</div>'; return; }

    el.innerHTML = files.map(f => `
        <div class="file-list-item">
            <span><i class="fas fa-file"></i> ${escapeHtml(f.file_name)}</span>
            <button class="btn sm danger" onclick="deleteProjectFile('${f.id}', '${f.storage_path}')">حذف</button>
        </div>
    `).join('');
}

document.getElementById('pmUploadBtn').addEventListener('click', async () => {
    const input = document.getElementById('pmFileInput');
    const file = input.files[0];
    if (!file) { showMsg('pmMsg', 'یک فایل انتخاب کنید.', 'error'); return; }

    const { data: proj } = await sb.from('projects').select('user_id').eq('id', ACTIVE_PROJECT_ID).single();
    const path = `${proj.user_id}/${ACTIVE_PROJECT_ID}/${Date.now()}_${file.name}`;

    const { error: upErr } = await sb.storage.from('project-files').upload(path, file);
    if (upErr) { showMsg('pmMsg', upErr.message, 'error'); return; }

    const { error: dbErr } = await sb.from('project_files').insert({
        project_id: ACTIVE_PROJECT_ID,
        file_name: file.name,
        storage_path: path,
        file_type: file.name.split('.').pop(),
        file_size: file.size,
        uploaded_by: CURRENT_USER.id
    });
    if (dbErr) { showMsg('pmMsg', dbErr.message, 'error'); return; }

    showMsg('pmMsg', 'فایل با موفقیت آپلود شد.', 'success');
    input.value = '';
    loadProjectFiles(ACTIVE_PROJECT_ID);
});

async function deleteProjectFile(fileId, storagePath) {
    if (!confirm('این فایل حذف شود؟')) return;
    await sb.storage.from('project-files').remove([storagePath]);
    const { error } = await sb.from('project_files').delete().eq('id', fileId);
    if (error) { alert(error.message); return; }
    loadProjectFiles(ACTIVE_PROJECT_ID);
}

/* ════════════════════════════════════════════════
   TICKETS
   ════════════════════════════════════════════════ */
const ticketStatusLabel = { open: 'باز', answered: 'پاسخ داده شده', closed: 'بسته شده' };

async function loadTickets() {
    const { data: tickets, error } = await sb
        .from('tickets')
        .select('id, subject, category, status, created_at, profiles(full_name)')
        .order('created_at', { ascending: false });

    const el = document.getElementById('ticketsList');
    if (error) { el.innerHTML = `<div class="empty">خطا: ${escapeHtml(error.message)}</div>`; return; }
    if (!tickets || tickets.length === 0) { el.innerHTML = '<div class="empty">هیچ تیکتی ثبت نشده</div>'; return; }

    el.innerHTML = tickets.map(t => `
        <div class="card">
            <div class="ticket-toggle" onclick="toggleTicket('${t.id}', this)">
                <h3>${escapeHtml(t.subject)}</h3>
                <div class="meta">از طرف: ${escapeHtml(t.profiles?.full_name || '—')}</div>
                <span class="badge ${t.status}">${ticketStatusLabel[t.status] || t.status}</span>
            </div>
            <div class="ticket-body" id="ticketBody-${t.id}"></div>
        </div>
    `).join('');
}

async function toggleTicket(ticketId, headerEl) {
    const body = document.getElementById('ticketBody-' + ticketId);
    const isOpen = body.classList.contains('open');
    document.querySelectorAll('.ticket-body.open').forEach(b => b.classList.remove('open'));
    if (isOpen) return;

    body.classList.add('open');
    body.innerHTML = '<div class="meta">در حال بارگذاری پیام‌ها...</div>';

    const { data: messages, error } = await sb
        .from('ticket_messages')
        .select('id, message, sender_id, created_at, profiles(full_name, role)')
        .eq('ticket_id', ticketId)
        .order('created_at', { ascending: true });

    if (error) { body.innerHTML = `<div class="meta">خطا: ${escapeHtml(error.message)}</div>`; return; }

    const msgsHtml = (messages || []).map(m => `
        <div class="msg-item ${m.profiles?.role === 'admin' ? 'is-admin' : ''}">
            <div class="who">${escapeHtml(m.profiles?.full_name || '—')} ${m.profiles?.role === 'admin' ? '(شما)' : ''}</div>
            <div>${escapeHtml(m.message)}</div>
        </div>
    `).join('') || '<div class="meta">پیامی موجود نیست</div>';

    body.innerHTML = `
        ${msgsHtml}
        <div class="row" style="margin-top:12px;">
            <input type="text" placeholder="پاسخ خود را بنویسید..." id="replyInput-${ticketId}" style="flex:1; border:1px solid var(--border); border-radius:4px; padding:8px 10px; font-size:12px; font-family:inherit;">
            <button class="btn sm" onclick="sendReply('${ticketId}')">ارسال</button>
        </div>
        <div class="row" style="margin-top:8px;">
            <button class="btn sm secondary" onclick="setTicketStatus('${ticketId}', 'answered')">علامت‌گذاری: پاسخ داده شد</button>
            <button class="btn sm secondary" onclick="setTicketStatus('${ticketId}', 'closed')">بستن تیکت</button>
        </div>
    `;
}

async function sendReply(ticketId) {
    const input = document.getElementById('replyInput-' + ticketId);
    const message = input.value.trim();
    if (!message) return;

    const { error } = await sb.from('ticket_messages').insert({
        ticket_id: ticketId, sender_id: CURRENT_USER.id, message
    });
    if (error) { alert(error.message); return; }

    await sb.from('tickets').update({ status: 'answered', updated_at: new Date().toISOString() }).eq('id', ticketId);
    input.value = '';
    toggleTicket(ticketId, null); // refresh
    document.getElementById('ticketBody-' + ticketId).classList.add('open');
    toggleTicket(ticketId, null);
    loadTickets();
}

async function setTicketStatus(ticketId, status) {
    const { error } = await sb.from('tickets').update({ status, updated_at: new Date().toISOString() }).eq('id', ticketId);
    if (error) { alert(error.message); return; }
    loadTickets();
}

/* ════════════════════════════════════════════════
   PRICING PLANS
   ════════════════════════════════════════════════ */
async function loadPricing() {
    const { data: plans, error } = await sb
        .from('pricing_plans')
        .select('*')
        .order('sort_order', { ascending: true });

    const el = document.getElementById('pricingList');
    if (error) { el.innerHTML = `<div class="empty">خطا: ${escapeHtml(error.message)}</div>`; return; }
    if (!plans || plans.length === 0) { el.innerHTML = '<div class="empty">هیچ پکیجی ثبت نشده</div>'; return; }

    el.innerHTML = plans.map(p => `
        <div class="card">
            <div class="row" style="justify-content:space-between;">
                <h3>${escapeHtml(p.title_fa)}</h3>
                <button class="btn sm danger" onclick="deletePlan('${p.id}')">حذف</button>
            </div>
            <div class="meta">${Number(p.price).toLocaleString('fa-IR')} تومان</div>
            <div class="meta">${escapeHtml(p.description_fa || '')}</div>
            <div class="meta">${(p.features_fa || []).join(' · ')}</div>
            <div class="row" style="margin-top:8px;">
                <button class="btn sm secondary" onclick="togglePlanActive('${p.id}', ${p.is_active})">
                    ${p.is_active ? 'غیرفعال کردن' : 'فعال کردن'}
                </button>
            </div>
        </div>
    `).join('');
}

document.getElementById('createPlanBtn').addEventListener('click', async () => {
    const title_fa = document.getElementById('newPlanTitleFa').value.trim();
    const price = parseFloat(document.getElementById('newPlanPrice').value);
    const description_fa = document.getElementById('newPlanDesc').value.trim();
    const features_fa = document.getElementById('newPlanFeatures').value
        .split('\n').map(s => s.trim()).filter(Boolean);

    if (!title_fa || !price) { showMsg('pricingMsg', 'عنوان و قیمت را وارد کنید.', 'error'); return; }

    const { error } = await sb.from('pricing_plans').insert({
        title_fa, price, description_fa, features_fa, sort_order: 99
    });
    if (error) { showMsg('pricingMsg', error.message, 'error'); return; }

    showMsg('pricingMsg', 'پکیج اضافه شد.', 'success');
    ['newPlanTitleFa','newPlanPrice','newPlanDesc','newPlanFeatures'].forEach(id => document.getElementById(id).value = '');
    loadPricing();
});

async function togglePlanActive(planId, currentActive) {
    const { error } = await sb.from('pricing_plans').update({ is_active: !currentActive }).eq('id', planId);
    if (error) { alert(error.message); return; }
    loadPricing();
}

async function deletePlan(planId) {
    if (!confirm('این پکیج حذف شود؟')) return;
    const { error } = await sb.from('pricing_plans').delete().eq('id', planId);
    if (error) { alert(error.message); return; }
    loadPricing();
}

/* ════════════════════════════════════════════════
   UTIL
   ════════════════════════════════════════════════ */
function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
